services:
  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./apps/web:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:4000
    depends_on:
      - api

  api:
    image: node:20
    working_dir: /app
    volumes:
      - ./apps/api:/app
    command: sh -c "npm install && npm run start"
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - PARSER_URL=http://parser:8001
      - VALIDATOR_URL=http://validator:8002
      - AI_URL=http://ai:8003
    depends_on:
      - parser
      - validator
      - ai

  parser:
    build:
      context: .
      dockerfile: infra/docker/parser.Dockerfile
    ports:
      - "8001:8001"

  validator:
    build:
      context: .
      dockerfile: infra/docker/validator.Dockerfile
    ports:
      - "8002:8002"

  ai:
    build:
      context: .
      dockerfile: infra/docker/ai.Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
